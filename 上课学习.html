    <h4>选择器的使用</h4>
   <p id="ccc"> “选择器”指明了{}中的“样式”的作用对象。</p>
   <p class="myClass">内嵌样式的使用是直接将在HTML标签里加入style属性。 </p>
   <div>element 选择器用于指定元素名称的所有元素。</div>
   <div class="myClass">.class 选择器选取带有指定类 (class) 的元素。</div>
